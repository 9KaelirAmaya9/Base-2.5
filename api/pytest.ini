[pytest]
# Keep the default test run self-contained.
# Integration/perf tests require external services (Postgres/Redis/Celery) and
# should be run explicitly via `-m integration` / `-m perf`.
addopts = -q -p no:django --cov=api --cov-report=term -m "not integration and not perf"
python_files = test_*.py
markers =
	integration: marks tests as integration (requires services)
	contract: marks contract validation tests
	e2e: marks end-to-end tests
	perf: marks performance tests
