[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
follow_imports = "skip"
warn_unused_ignores = true
no_implicit_optional = false
check_untyped_defs = false
exclude = '.*[\\\\/](django[\\\\/].*[\\\\/]migrations[\\\\/].*\\.py)$'
