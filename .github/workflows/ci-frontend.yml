name: CI (frontend)

on:
  pull_request:
  push:

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max_old_space_size=4096

    defaults:
      run:
        working-directory: react-app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: react-app/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-frontend
          path: react-app/coverage
          if-no-files-found: error
          retention-days: 7

      - name: Build
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook artifact
        if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: react-app/storybook-static
          if-no-files-found: error
          retention-days: 7

  chromatic:
    name: Publish Storybook to Chromatic
    runs-on: ubuntu-latest
    needs: frontend
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip Chromatic (missing token)
        if: ${{ env.CHROMATIC_PROJECT_TOKEN == '' }}
        run: echo "CHROMATIC_PROJECT_TOKEN is not set; skipping Chromatic publish."

      - name: Publish to Chromatic
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@v15
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          workingDir: react-app
          buildScriptName: build-storybook
