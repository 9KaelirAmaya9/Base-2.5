name: CI (repo guards)

on:
  pull_request:
  push:

jobs:
  repo-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repo guard checks
        run: |
          node scripts/validate-command-matrix.js
          node scripts/guard-shell-parity.js
          pwsh -Command "$t=Measure-Command { node scripts/guard-shell-parity.js }; if ($t.TotalSeconds -gt 30) { throw 'Guard exceeded 30s' }"
          chmod +x scripts/bash/repo_guard.sh
          bash scripts/bash/repo_guard.sh
