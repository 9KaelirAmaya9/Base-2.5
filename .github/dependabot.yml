version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    groups:
      root-npm:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/react-app'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    groups:
      react-app:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/e2e'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    groups:
      e2e:
        patterns:
          - '*'

  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    groups:
      root-python:
        patterns:
          - '*'

  - package-ecosystem: 'pip'
    directory: '/api'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    groups:
      api-python:
        patterns:
          - '*'

  - package-ecosystem: 'pip'
    directory: '/django'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    groups:
      django-python:
        patterns:
          - '*'

  - package-ecosystem: 'pip'
    directory: '/digital_ocean'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    groups:
      digital-ocean-python:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
